# ============================================================
# SmartCourier - Auth Service Configuration
# Port: 8081 | Handles user registration, login, JWT issuance
# ============================================================

server:
  port: 8081

spring:
  application:
    name: auth-service

  # --------------------------------------------------------
  # DataSource - MySQL connection for auth_db
  # Each microservice has its OWN isolated database schema
  # --------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Sai@2003   # Change this to your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --------------------------------------------------------
  # JPA / Hibernate settings
  # --------------------------------------------------------
  jpa:
    hibernate:
      # 'update' auto-creates/updates tables from entities
      # Use 'validate' in production after schema is stable
      ddl-auto: update
    show-sql: true   # Set to false in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# --------------------------------------------------------
# JWT Configuration
# IMPORTANT: jwt.secret must be identical in api-gateway
# Minimum 256-bit (32 characters) Base64-encoded key
# --------------------------------------------------------
jwt:
  secret: SmartCourierSuperSecretKey2025SmartCourierSuperSecretKey2025==
  expiration: 3600        # Access token validity: 1 hour in seconds
  refresh-expiration: 604800  # Refresh token validity: 7 days in seconds

# --------------------------------------------------------
# SpringDoc / Swagger UI
# Access at: http://localhost:8081/swagger-ui.html
# --------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
logging:
  level:
    com.smartcourier.auth: DEBUG
    org.springframework.security: INFO

# In each service application.yml
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/