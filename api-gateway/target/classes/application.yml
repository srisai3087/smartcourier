logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.smartcourier.gateway: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans